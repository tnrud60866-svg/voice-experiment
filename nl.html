<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>음성 실험 문장 제시</title>
<style>
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #ffffff !important;
    color: #151515;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans KR", sans-serif;
  }
  body { touch-action: manipulation; }
  .screen {
    width: 100vw;
    height: 100vh;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 28px;
    background: #ffffff !important;
  }
  .card {
    width: min(880px, 100%);
    background: #ffffff !important;
    padding: 44px;
    text-align: center;
  }
  p.guide {
    white-space: pre-line;
    font-size: clamp(18px, 2.8vw, 25px);
    line-height: 1.75;
    margin: 0 0 28px;
    color: #222;
  }
  .row {
    display: flex;
    gap: 12px;
    justify-content: center;
    flex-wrap: wrap;
    margin-top: 18px;
  }
  input {
    width: min(360px, 100%);
    font-size: 20px;
    padding: 15px 18px;
    border: 1px solid #d0d0d0;
    border-radius: 14px;
    outline: none;
  }
  input:focus { border-color: #333; }
  button {
    font-size: 20px;
    padding: 15px 24px;
    border: 0;
    border-radius: 14px;
    background: #111;
    color: white;
    cursor: pointer;
  }
  .sentence {
    width: 100%;
    max-width: 1200px;
    text-align: center;
    font-size: 84px;
    line-height: 1.2;
    font-weight: 700;
    white-space: nowrap;
    word-break: normal;
    overflow: hidden;
  }
  .end-text, .break-text {
    white-space: pre-line;
    font-size: clamp(32px, 5vw, 60px);
    line-height: 1.6;
    font-weight: 800;
    text-align: center;
  }
  .small {
    margin-top: 18px;
    color: #555;
    font-size: 15px;
  }
  .hidden { display: none !important; }
</style>
</head>

<section id="start" class="screen">
  <div class="card">
    <p class="guide">음성 실험 참여에 감사드립니다.
다음 장부터 화면에 제시되는 문장을
편안하게 낭독해 주세요.

실수가 있을 때는 문장을 처음부터 다시 읽으면 됩니다.

      <button id="startBtn" type="button">시작하기</button>
    </div>
  </div>
</section>

<section id="trial" class="screen hidden">
  <div class="sentence" id="sentence"></div>
</section>

<section id="break" class="screen hidden">
  <div class="card">
    <div class="break-text">잠시 쉬어가겠습니다.

준비가 되셨으면 실험자가 V 키를 눌러
다음 문장부터 이어서 진행하겠습니다.</div>
  </div>
</section>

<section id="end" class="screen hidden">
  <div class="card">

    <div class="end-text">
      실험이 종료되었습니다.
      감사합니다.
    </div>

        다음 실험 선택하기

    </div>

  </div>  
</section>

let participantInitial = "";
let trials = [];
let index = 0;
let saved = false;
let breakShown = false;

function shuffle(array) {
  const a = array.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function prepareTrials() {
  const fixed = RAW_ITEMS.slice(0, 4);
  const rest = shuffle(RAW_ITEMS.slice(4));
  const ordered = fixed.concat(rest);
  return ordered.map((item, i) => ({ ...item, order: i + 1 }));
}

function showOnly(id) {
  ["start", "trial", "break", "end"].forEach(screenId => {
    document.getElementById(screenId).classList.toggle("hidden", screenId !== id);
  });
}

function startExperiment() {
  const value = document.getElementById("participantInitial").value.trim();
  if (!value) {
    alert("이니셜을 입력해 주세요.");
    return;
  }
  participantInitial = value;
  trials = prepareTrials();
  index = 0;
  saved = false;
  breakShown = false;
  showOnly("trial");
  showTrial();
}

function showTrial() {
  const trial = trials[index];
  document.body.style.background = "#ffffff";
  document.getElementById("trial").style.background = "#ffffff";
  document.getElementById("sentence").textContent = trial.sentence;
  fitSentenceText();
}

function nextTrial() {
  const breakVisible = !document.getElementById("break").classList.contains("hidden");
  const trialVisible = !document.getElementById("trial").classList.contains("hidden");

  if (breakVisible) {
    showOnly("trial");
    showTrial();
    return;
  }

  if (!trialVisible) return;

  index += 1;

  if (index === 50 && !breakShown && index < trials.length) {
    breakShown = true;
    showOnly("break");
    return;
  }

  if (index >= trials.length) {
    finishExperiment();
  } else {
    showTrial();
  }
}

function fitSentenceText() {
  const el = document.getElementById("sentence");
  if (!el || !el.textContent) return;

  let size = 84;
  el.style.fontSize = size + "px";

  while (el.scrollWidth > el.clientWidth && size > 14) {
    size -= 1;
    el.style.fontSize = size + "px";
  }
}

function safeFilename(name) {
  return (name || "participant").replace(/[\\/:*?"<>|]/g, "_").trim() || "participant";
}

function xmlEscape(s) {
  return String(s ?? "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

function makeXlsxBlob(rows) {
  const files = {
    "[Content_Types].xml": `<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Types xmlns="http://schemas.openxmlformats.org/package/2006/content-types"><Default Extension="rels" ContentType="application/vnd.openxmlformats-package.relationships+xml"/><Default Extension="xml" ContentType="application/xml"/><Override PartName="/xl/workbook.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.sheet.main+xml"/><Override PartName="/xl/worksheets/sheet1.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.worksheet+xml"/></Types>`,
    "_rels/.rels": `<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships"><Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/officeDocument" Target="xl/workbook.xml"/></Relationships>`,
    "xl/_rels/workbook.xml.rels": `<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships"><Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/worksheet" Target="worksheets/sheet1.xml"/></Relationships>`,
    "xl/workbook.xml": `<?xml version="1.0" encoding="UTF-8" standalone="yes"?><workbook xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main" xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships"><sheets><sheet name="order" sheetId="1" r:id="rId1"/></sheets></workbook>`
  };

  const sheetRows = [["order","id","sentence"]].concat(rows.map(r => [r.order, r.id, r.sentence]));
  const sheetData = sheetRows.map((row, rIdx) => `<row r="${rIdx+1}">` + row.map((v, cIdx) => {
    const col = String.fromCharCode(65 + cIdx);
    if (typeof v === "number") return `<c r="${col}${rIdx+1}"><v>${v}</v></c>`;
    return `<c r="${col}${rIdx+1}" t="inlineStr"><is><t>${xmlEscape(v)}</t></is></c>`;
  }).join("") + `</row>`).join("");

  files["xl/worksheets/sheet1.xml"] = `<?xml version="1.0" encoding="UTF-8" standalone="yes"?><worksheet xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main"><cols><col min="1" max="1" width="10" customWidth="1"/><col min="2" max="2" width="14" customWidth="1"/><col min="3" max="3" width="70" customWidth="1"/></cols><sheetData>${sheetData}</sheetData></worksheet>`;
  return zipStore(files);
}

function crc32(buf) {
  let table = crc32.table || (crc32.table = Array.from({length:256}, (_,n) => {
    let c=n;
    for(let k=0;k<8;k++) c=((c&1)?(0xEDB88320^(c>>>1)):(c>>>1));
    return c>>>0;
  }));
  let crc = -1;
  for (let i=0; i<buf.length; i++) crc = (crc >>> 8) ^ table[(crc ^ buf[i]) & 255];
  return (crc ^ -1) >>> 0;
}

function u16(n) { return [n & 255, (n >>> 8) & 255]; }
function u32(n) { return [n & 255, (n >>> 8) & 255, (n >>> 16) & 255, (n >>> 24) & 255]; }

function zipStore(files) {
  const enc = new TextEncoder();
  let chunks = [], central = [], offset = 0;
  for (const name of Object.keys(files)) {
    const nameBytes = enc.encode(name), data = enc.encode(files[name]), crc = crc32(data);
    const local = new Uint8Array([0x50,0x4b,0x03,0x04, ...u16(20), ...u16(0), ...u16(0), ...u16(0), ...u16(0), ...u32(crc), ...u32(data.length), ...u32(data.length), ...u16(nameBytes.length), ...u16(0)]);
    chunks.push(local, nameBytes, data);
    const cent = new Uint8Array([0x50,0x4b,0x01,0x02, ...u16(20), ...u16(20), ...u16(0), ...u16(0), ...u16(0), ...u16(0), ...u32(crc), ...u32(data.length), ...u32(data.length), ...u16(nameBytes.length), ...u16(0), ...u16(0), ...u16(0), ...u16(0), ...u32(0), ...u32(offset)]);
    central.push(cent, nameBytes);
    offset += local.length + nameBytes.length + data.length;
  }
  const centralSize = central.reduce((s,c)=>s+c.length,0), centralOffset = offset;
  const eocd = new Uint8Array([0x50,0x4b,0x05,0x06, ...u16(0), ...u16(0), ...u16(Object.keys(files).length), ...u16(Object.keys(files).length), ...u32(centralSize), ...u32(centralOffset), ...u16(0)]);
  return new Blob([...chunks, ...central, eocd], {type:"application/vnd.openxmlformats-officedocument.spreadsheetml.sheet"});
}

function downloadOrder() {
  const blob = makeXlsxBlob(trials.map(t => ({order:t.order, id:t.id, sentence:t.sentence})));
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = safeFilename(participantInitial) + ".xlsx";
  document.body.appendChild(a);
  a.click();
  setTimeout(() => { URL.revokeObjectURL(a.href); a.remove(); }, 1000);
}

function finishExperiment() {
  showOnly("end");
  if (!saved) {
    saved = true;
    downloadOrder();
  }
}

document.getElementById("startBtn").addEventListener("click", startExperiment);
document.getElementById("participantInitial").addEventListener("keydown", e => {
  if (e.key === "Enter") startExperiment();
});

document.addEventListener("keydown", e => {
  if (e.key && e.key.toLowerCase() === "v") {
    nextTrial();
  }
});

document.getElementById("downloadAgain").addEventListener("click", downloadOrder);
window.addEventListener("resize", fitSentenceText);
</script>
