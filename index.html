<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>음성 실험</title>
<style>
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    width: 100%;
    min-height: 100%;
    background: #ffffff;
    color: #151515;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans KR", sans-serif;
  }
  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 28px;
  }
  .wrap {
    width: min(760px, 100%);
    text-align: center;
  }
  h1 {
    margin: 0 0 18px;
    font-size: clamp(32px, 6vw, 58px);
    line-height: 1.2;
  }
  p {
    margin: 0 0 36px;
    font-size: clamp(17px, 2.5vw, 23px);
    line-height: 1.7;
    color: #333;
  }
  .buttons {
    display: flex;
    gap: 18px;
    justify-content: center;
    flex-wrap: wrap;
  }
  a {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 220px;
    padding: 20px 26px;
    border-radius: 18px;
    background: #111;
    color: #fff;
    text-decoration: none;
    font-size: clamp(20px, 3vw, 28px);
    font-weight: 700;
  }
  a:active {
    transform: translateY(1px);
  }
</style>
</head>
<body>
  <main class="wrap">
    <h1>음성 실험</h1>
    <p>진행할 실험을 선택해 주세요.</p>
    <div class="buttons">
      <a href="./nl.html">NL 실험</a>
      <a href="./ou.html">OU 실험</a>
    </div>
  </main>
</body>
</html>
